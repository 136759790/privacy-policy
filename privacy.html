        // 切换语言函数

        function switchLang(lang) {

            // 隐藏所有内容

            document.querySelector('.zh-content').style.display = 'none';

            document.querySelector('.en-content').style.display = 'none';

            // 移除所有按钮激活状态

            document.querySelectorAll('.lang-btn').forEach(btn => {

                btn.classList.remove('active');

            });

            // 显示对应语言内容 + 激活按钮

            if (lang === 'zh') {

                document.querySelector('.zh-content').style.display = 'block';

                document.querySelector('.lang-btn[onclick="switchLang('zh')"]').classList.add('active');

                document.documentElement.lang = 'zh-CN';

            } else if (lang === 'en') {

                document.querySelector('.en-content').style.display = 'block';

                document.querySelector('.lang-btn[onclick="switchLang('en')"]').classList.add('active');

                document.documentElement.lang = 'en-US';

            }

        }

        // 初始化：根据浏览器语言自动切换（可选）

        window.onload = function() {

            const browserLang = navigator.language || navigator.userLanguage;

            if (browserLang.startsWith('en')) {

                switchLang('en');

            } else {

                switchLang('zh');

            }
